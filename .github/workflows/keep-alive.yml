name: Keep Alive

on:
  schedule:
    # Run once per week (Monday at 09:00 UTC)
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          URL="https://YOUR-VERCEL-DOMAIN/api/health"
          echo "Pinging ${URL}"
          curl --fail --show-error --silent --location \
            --dump-header - \
            --write-out "\nHTTP_STATUS:%{http_code}\n" \
            "${URL}"
